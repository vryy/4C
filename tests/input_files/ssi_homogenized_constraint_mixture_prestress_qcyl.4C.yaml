TITLE:
  - "Test case for Prestressing in SSI for growth and remodeling:"
  - "- Check whether the convergence criterion for PRESTRESSTOLDISP"
  - "- causes the desired early stoppage of the simulation."
PROBLEM TYPE:
  PROBLEMTYPE: "Structure_Scalar_Interaction"
CLONING MATERIAL MAP:
  - SRC_FIELD: "structure"
    SRC_MAT: 1
    TAR_FIELD: "scatra"
    TAR_MAT: 101
fields:
  - name: "fiber5"
    discretization: "structure"
    source:
      from_mesh:
        basis: "points"
  - name: "fiber1"
    discretization: "structure"
    source:
      from_mesh:
        basis: "points"
  - name: "fiber2"
    discretization: "structure"
    source:
      from_mesh:
        basis: "points"
  - name: "fiber3"
    discretization: "structure"
    source:
      from_mesh:
        basis: "points"
  - name: "fiber4"
    discretization: "structure"
    source:
      from_mesh:
        basis: "points"
IO:
  VERBOSITY: "Standard"
  STRUCT_STRAIN: "gl"
  STRUCT_STRESS: "cauchy"
  WRITE_FINAL_STATE: true
  WRITE_INITIAL_STATE: false
IO/RUNTIME VTK OUTPUT:
  OUTPUT_DATA_FORMAT: "ascii"
  INTERVAL_STEPS: 1
IO/RUNTIME VTK OUTPUT/STRUCTURE:
  OUTPUT_STRUCTURE: true
  DISPLACEMENT: true
  STRESS_STRAIN: true
SCALAR TRANSPORT DYNAMIC:
  SOLVERTYPE: "nonlinear"
  TIMEINTEGR: "One_Step_Theta"
  SKIPINITDER: true
  THETA: 1.0
  RESULTSEVERY: 1
  MATID: 101
  INITIALFIELD: "field_by_function"
  VELOCITYFIELD: "Navier_Stokes"
  INITFUNCNO: 1
  CONVFORM: "convective"
  IS_INTENSIVE_SCALAR: true
  LINEAR_SOLVER: 1
SCALAR TRANSPORT DYNAMIC/NONLINEAR:
  ITEMAX: 30
  CONVTOL: 1e-09
SCALAR TRANSPORT DYNAMIC/STABILIZATION:
  STABTYPE: "no_stabilization"
  DEFINITION_TAU: "Zero"
  EVALUATION_TAU: "integration_point"
  EVALUATION_MAT: "integration_point"
SOLVER 1:
  SOLVER: "MUMPS"
SSI CONTROL:
  NUMSTEP: 30
  MAXTIME: 2000.0000000001
  TIMESTEP: 1.0
  RESULTSEVERY: 1
  ITEMAX: 20
SSI CONTROL/PARTITIONED:
  CONVTOL: 1e-08
STRUCT NOX/Printing:
  Outer Iteration: true
  Inner Iteration: false
  Outer Iteration StatusTest: false
STRUCTURAL DYNAMIC:
  DYNAMICTYPE: "OneStepTheta"
  NEGLECTINERTIA: true
  TOLDISP: 1e-12
  TOLRES: 1e-12
  LINEAR_SOLVER: 1
  NLNSOL: "noxnln"
  LOADLIN: true
  PRESTRESS: "material_iterative"
  PRESTRESSTIME: 2000.0000000001
  PRESTRESSTOLDISP: 0.0001
  PRESTRESSMINLOADSTEPS: 4
STRUCTURAL DYNAMIC/ONESTEPTHETA:
  THETA: 1.0
STRUCTURE GEOMETRY:
  FILE: "vtu/homogenized-constrained-mixture-qcyl.vtu"
  ELEMENT_BLOCKS:
    - ID: 1
      SOLIDSCATRA:
        HEX8:
          MAT: 1
          KINEM: "nonlinear"
          TYPE: "GR"
MATERIALS:
  - MAT: 1
    MAT_Mixture:
      MATIDSCONST: [11, 12, 13, 14, 15]
      MATIDMIXTURERULE: 10
  - MAT: 10
    MIX_GrowthRemodelMixtureRule:
      GROWTH_STRATEGY: 100
      MASSFRAC: [0.8, 0.05, 0.05, 0.05, 0.05]
      DENS: 10.500000000000002
  - MAT: 100
    MIX_GrowthStrategy_Anisotropic:
      GROWTH_DIRECTION:
        from_mesh: "fiber5"
  - MAT: 11
    MIX_Constituent_ElastHyper:
      NUMMAT: 2
      MATIDS: [111, 112]
      PRESTRESS_STRATEGY: 119
  - MAT: 111
    ELAST_IsoNeoHooke:
      MUE:
        constant: 0.09769999999999998
  - MAT: 112
    ELAST_VolSussmanBathe:
