TITLE:
  - "Contact simulation between a body made of 2x2x1 solid HEX8 elements (master) and a body made of 2x2x1
    poro-viscoplastic HEX8 elements (slave)."
  - "Mortar coupling is applied with the Nitsche algorithm."
  - "A displacement is prescribed using cosine ramps 'downwards' (in the negative z-direction) on the
    upper solid body. The bottom surface of the poro-viscoplastic body is fixed."
  - "The poro-viscoplastic material behavior is described by a neo-Hookean porosity law, with Reformulated
    Johnson-Cook finite strain viscoplasticity (see Mareau: A thermodynamically consistent formulation
    of the Johnson-Cook model, Mechanics of Materials 143, 2020).  The solid body is modeled with a neo-Hooke
    elasticity law."
  - "Both bodies exhibit the same Young's modulus."
