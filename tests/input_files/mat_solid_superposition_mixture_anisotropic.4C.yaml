TITLE:
  - Testcase for testing the superposition for 3D solid materials (MAT_Solid_Superposition) using a mixture
    with anisotropic elasthyper constituents
  - The setup of the test-case is a single cube with HEX8 elements.
  - The cube is fixed on the bottom surface (z=0). On the top surface (z=1), a surface force is applied
    in x-, y- and z-direction subsequently.
  - The test uses the MAT_Solid_Superposition with two material constituents.
  - A MAT_Mixture (MAT 10) wrapping anisotropic elasthyper materials (ELAST_CoupAnisoExpo GAMMA 10 + ELAST_CoupNeoHooke
    YOUNG 15) and a MAT_ElastHyper (MAT 20) with anisotropic elasthyper materials (ELAST_CoupAnisoExpo
    GAMMA 25 + ELAST_CoupNeoHooke YOUNG 5).
  - MAT 10 contains only a single constituent with mass fraction 1.0, so it acts as a pure wrapper around
    the elasthyper material with no actual mixture behavior. This is done to verify that the mixture framework
    works correctly within a MAT_Solid_Superposition context.
  - The expected results match those of mat_solid_superposition_elasthyper_anisotropic, confirming that
    MAT_Solid_Superposition handles mixture constituents correctly."
