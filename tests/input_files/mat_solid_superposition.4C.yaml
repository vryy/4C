      MATIDS: [11, 12]
      DENS: 1.0
  - MAT: 11
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 200
      NUE: 0
      DENS: 1
  - MAT: 12
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 600
      NUE: 0
      DENS: 1
