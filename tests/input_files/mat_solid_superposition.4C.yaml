TITLE:
  - Testcase for testing the superposition for 3D solid materials (MAT_Solid_Superposition)
  - The setup of the test-case is a single cube with HEX8 elements.
  - The cube is fixed on the bottom surface (z=0). On the top surface (z=1), a surface force is applied
    in x-, y- and z-direction subsequently.
  - The test uses the MAT_Solid_Superposition with two St. Venant Kirchhoff constituents with Young moduli
    200 and 600 (summing to 800).
  - The results match a single St. Venant Kirchhoff material with Young's modulus 800, verifying linear
    superposition of stresses and tangents.
PROBLEM TYPE:
  PROBLEMTYPE: "Structure"
IO:
  STRUCT_STRESS: "2PK"
  STRUCT_STRAIN: "GL"
IO/RUNTIME VTK OUTPUT:
  INTERVAL_STEPS: 1
IO/RUNTIME VTK OUTPUT/STRUCTURE:
  OUTPUT_STRUCTURE: true
  DISPLACEMENT: true
  ELEMENT_OWNER: true
  NODE_GID: true
  STRESS_STRAIN: true
STRUCTURAL DYNAMIC:
  RESTARTEVERY: 25
  DYNAMICTYPE: "Statics"
  TIMESTEP: 0.1
  NUMSTEP: 30
  MAXTIME: 3
  TOLDISP: 1e-09
  TOLRES: 1e-09
  ITERNORM: "Inf"
  LINEAR_SOLVER: 1
SOLVER 1:
  SOLVER: "UMFPACK"
DESIGN SURF DIRICH CONDITIONS:
  - E: 1
    NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [0, 0, 0]
    FUNCT: [0, 0, 0]
DESIGN SURF NEUMANN CONDITIONS:
