  - MAT: 1000
    MAT_scatra_gr:
      DIFFUSIVITY: 0.0
      STRUCTURE_MAT_ID: 12
      SCALAR_QUANTITY: "growth"
  - MAT: 1001
    MAT_scatra_gr:
      DIFFUSIVITY: 0.0
      STRUCTURE_MAT_ID: 12
      SCALAR_QUANTITY: "remodeling"
  - MAT: 1002
    MAT_scatra_gr:
      DIFFUSIVITY: 0.0
      STRUCTURE_MAT_ID: 13
      SCALAR_QUANTITY: "growth"
  - MAT: 1003
