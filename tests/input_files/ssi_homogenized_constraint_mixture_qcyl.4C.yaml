      DIFFUSIVITY: 0.0
      STRUCTURE_MAT_ID: 15
      SCALAR_QUANTITY: "remodeling"
  - MAT: 101
    MAT_matlist:
      LOCAL: false
      NUMMAT: 8
      MATIDS: [1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007]
