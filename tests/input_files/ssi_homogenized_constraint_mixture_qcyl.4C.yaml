      DECAY_TIME: 101.0
      GROWTH_CONSTANT: 0.0009900990099009901
      DEPOSITION_STRETCH: 0.0
      DEPOSITION_STRETCH_TIMEFUNCT: 3
      ORIENTATION:
        from_mesh: "fiber1"
      INELASTIC_GROWTH: true
      ENABLE_GROWTH: true
      GROWTH_SCALAR_ID: 0
      REMODELING_SCALAR_ID: 1
  - MAT: 120
