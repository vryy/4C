      DIFFUSIVITY: 0.0
      STRUCTURE_MAT_ID: 13
      SCALAR_QUANTITY: "remodeling"
  - MAT: 1004
    MAT_scatra_gr:
      DIFFUSIVITY: 0.0
      STRUCTURE_MAT_ID: 14
      SCALAR_QUANTITY: "growth"
  - MAT: 1005
