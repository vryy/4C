PROBLEM TYPE:
  PROBLEMTYPE: "Thermo_Structure_Interaction"
IO:
  STRUCT_STRESS: "Cauchy"
  STRUCT_STRAIN: "LOG"
IO/RUNTIME VTK OUTPUT/STRUCTURE:
  OUTPUT_STRUCTURE: true
  DISPLACEMENT: true
  STRESS_STRAIN: true
IO/RUNTIME VTK OUTPUT:
  INTERVAL_STEPS: 1
STRUCTURAL DYNAMIC:
  DYNAMICTYPE: "Statics"
  RESTARTEVERY: 30
  TOLDISP: 1e-08
  NEGLECTINERTIA: true
  LINEAR_SOLVER: 1
THERMAL DYNAMIC:
  DYNAMICTYPE: OneStepTheta
  INITIALFIELD: "field_by_function"
  INITFUNCNO: 2
  TOLTEMP: 1e-08
  NORM_TEMP: Abs
  TOLRES: 1e-06
  NORM_RESF: Abs
  NORMCOMBI_RESFTEMP: And
  MAXITER: 50
  MINITER: 0
  ITERNORM: L2
  NLNSOL: fullnewton
  PREDICT: ConstTemp
  ADAPTCONV: false
  ADAPTCONV_BETTER: 0.1
  LUMPCAPA: false
  LINEAR_SOLVER: 1
  CALCERROR: "No"
  CALCERRORFUNCNO: -1
THERMAL DYNAMIC/RUNTIME VTK OUTPUT:
  OUTPUT_THERMO: true
  TEMPERATURE: true
TSI DYNAMIC:
  COUPALGO: tsi_iterstagg
  MATCHINGGRID: true
  RESTARTEVERY: 30
  NUMSTEP: 100000000
  MAXTIME: 0.0001 # [s]
  TIMESTEP: 1e-6 # [s]
  ITEMAX: 10
  ITEMIN: 0
  RESULTSEVERY: 1
  NORM_INC: Abs
TSI DYNAMIC/PARTITIONED:
  CONVTOL: 1e-10
  COUPVARIABLE: Temperature
SOLVER 1:
  SOLVER: "UMFPACK"
MATERIALS:
  - MAT: 1
    MAT_MultiplicativeSplitDefgradElastHyper:
      NUMMATEL: 1
      MATIDSEL: [2]
      NUMFACINEL: 1
      INELDEFGRADFACIDS: [3]
      DENS: 7830e-12 # [t/mm^3 = N*s^2/mm^4]
      REF_TEMPERATURE: 293.0 # [K]
      THERMAL_EXPANSION_COEFFICIENT: 11e-6 # [1/K]
  - MAT: 2
    ELAST_CoupNeoHooke:
      YOUNG: 200000 # [N/mm^2]
      NUE: 0.29 # [-]
  - MAT: 3
    MAT_InelasticDefgradTransvIsotropElastViscoplast:
      VISCOPLAST_LAW_ID: 4
      TAYLOR_QUINNEY_COEFFICIENT: 0.85 # [-]
      FIBER_READER_ID: 5
      MAT_BEHAVIOR: "isotropic"
      TIME_INTEGRATION_HIST_VARS: logarithmic
      LOCAL_NEWTON:
        CONV_CHECK: residual_and_increment_ratio
        MAX_ITER: 100
        RES_TOL: 1e-8
        INCR_TOL: 1e-8
        MAX_EXCEEDANCE_FACT_RES_TOL: 10
        MAX_EXCEEDANCE_FACT_INCR_TOL: 10
        DIVER_CONT: stop
  - MAT: 4
    MAT_ViscoplasticLawReformulatedJohnsonCook:
      STRAIN_RATE_PREFAC: 1 # [1/s]
      STRAIN_RATE_EXP_FAC: 0.014 # [-]
      INIT_YIELD_STRENGTH: 792 # [N/mm^2]
      ISOTROP_HARDEN_PREFAC: 510 # [N/mm^2]
      ISOTROP_HARDEN_EXP: 0.26 # [-]
      REF_TEMPERATURE: 293.0 # [K]
      TEMPERATURE_SENS: 1.03 # [-]
      MELT_TEMPERATURE: 1793 # [K]
  - MAT: 5
    ELAST_CoupTransverselyIsotropic:
      ALPHA: 1
      BETA: 1
      GAMMA: 1
      ANGLE: 0
      STR_TENS_ID: 100
  - MAT: 100
    ELAST_StructuralTensor:
      STRATEGY: "Standard"

  - MAT: 10
    MAT_Fourier:
      CAPA: 3.734910 # [mJ/(mm^3*K) = N/(mm^2*K)]
      CONDUCT:
        constant: [37] # [mW/(mm*K) = N/s/K]

CLONING MATERIAL MAP:
  - SRC_FIELD: structure
    SRC_MAT: 1
    TAR_FIELD: thermo
    TAR_MAT: 10

FUNCT1:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "a"
  - VARIABLE: 0
    NAME: "a"
    TYPE: "multifunction"
    NUMPOINTS: 2
    TIMES: [0, 1.6e+16]
    DESCRIPTION: ["(exp(1.0e2*t)-1.0)"] # [mm]
FUNCT2:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "temperature_initial_field"
  - VARIABLE: 0
    TYPE: expression
    NAME: "temperature_initial_field"
    DESCRIPTION: "293"
