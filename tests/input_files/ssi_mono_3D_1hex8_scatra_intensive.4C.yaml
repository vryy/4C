TITLE:
  - "simple, academic test case for scalar-structure interaction of intensive scalars:"
  - "- three-dimensional problem involving scalar transport of pure material-related scalar in a deforming
    structure"
  - "- cubic domain discretized by 1 hex8 element"
  - "- constant initial value 1.0 of transported scalar"
  - "- structural field stretched in x-direction by a factor of 2 via Dirichlet boundary conditions"
  - "- scalar field expected to stay constant at 1.0 due to the pure material nature of the scalar"
PROBLEM TYPE:
  PROBLEMTYPE: "Structure_Scalar_Interaction"
IO:
  STDOUTEVERY: 0
STRUCTURAL DYNAMIC:
  NEGLECTINERTIA: true
  DYNAMICTYPE: "OneStepTheta"
  LINEAR_SOLVER: 1
SCALAR TRANSPORT DYNAMIC:
  IS_INTENSIVE_SCALAR: true
  SOLVERTYPE: "nonlinear"
  VELOCITYFIELD: "Navier_Stokes"
  INITIALFIELD: "field_by_function"
  INITFUNCNO: 1
  CONVFORM: "convective"
  SKIPINITDER: true
  LINEAR_SOLVER: 1
SSI CONTROL:
  NUMSTEP: 10
  TIMESTEP: 0.1
  COUPALGO: "ssi_IterStagg"
SSI CONTROL/PARTITIONED:
  CONVTOL: 1e-10
SOLVER 1:
  SOLVER: "UMFPACK"
MATERIALS:
  - MAT: 1
    MAT_scatra:
      DIFFUSIVITY: 1
  - MAT: 2
    MAT_MultiplicativeSplitDefgradElastHyper:
      NUMMATEL: 1
      MATIDSEL: [3]
      NUMFACINEL: 1
      INELDEFGRADFACIDS: [4]
      DENS: 1
  - MAT: 3
    ELAST_CoupSVK:
      YOUNG: 1
      NUE: 0.3
  - MAT: 4
    MAT_InelasticDefgradNoGrowth: {}
CLONING MATERIAL MAP:
  - SRC_FIELD: "structure"
    SRC_MAT: 2
    TAR_FIELD: "scatra"
    TAR_MAT: 1
FUNCT1:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "1.0"
FUNCT2:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "0.5*(1.0-cos(pi*t))*heaviside(1.0-t)+heaviside(t-1.0)"
RESULT DESCRIPTION:
  - SCATRA:
      DIS: "scatra"
      NODE: 1
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
  - SCATRA:
      DIS: "scatra"
      NODE: 2
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
  - SCATRA:
      DIS: "scatra"
      NODE: 3
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
  - SCATRA:
      DIS: "scatra"
      NODE: 4
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
  - SCATRA:
      DIS: "scatra"
      NODE: 5
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
  - SCATRA:
      DIS: "scatra"
      NODE: 6
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
  - SCATRA:
      DIS: "scatra"
      NODE: 7
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
  - SCATRA:
      DIS: "scatra"
      NODE: 8
      QUANTITY: "phi"
      VALUE: 1.0
      TOLERANCE: 1.5e-08
DESIGN SURF DIRICH CONDITIONS:
  - E: 1
    NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [0, 0, 0]
    FUNCT: [null, null, null]
  - E: 2
    NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [1, 0, 0]
    FUNCT: [2, null, null]
DSURF-NODE TOPOLOGY:
  - "NODE 1 DSURFACE 1"
  - "NODE 2 DSURFACE 1"
  - "NODE 3 DSURFACE 1"
  - "NODE 4 DSURFACE 1"
  - "NODE 5 DSURFACE 2"
  - "NODE 6 DSURFACE 2"
  - "NODE 7 DSURFACE 2"
  - "NODE 8 DSURFACE 2"
DVOL-NODE TOPOLOGY:
  - "NODE 1 DVOL 1"
  - "NODE 2 DVOL 1"
  - "NODE 3 DVOL 1"
  - "NODE 4 DVOL 1"
  - "NODE 5 DVOL 1"
  - "NODE 6 DVOL 1"
  - "NODE 7 DVOL 1"
