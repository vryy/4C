TITLE:
  - "Restart from isochoric iterative prestretching"
PROBLEM TYPE:
  PROBLEMTYPE: "Structure"
IO:
  OUTPUT_SPRING: true
  STRUCT_STRESS: "Cauchy"
  STRUCT_STRAIN: "GL"
  WRITE_INITIAL_STATE: false
  WRITE_FINAL_STATE: true
  VERBOSITY: "Standard"
IO/RUNTIME VTK OUTPUT:
  INTERVAL_STEPS: 5
IO/RUNTIME VTK OUTPUT/STRUCTURE:
  OUTPUT_STRUCTURE: true
  DISPLACEMENT: true
  ELEMENT_OWNER: true
  STRESS_STRAIN: true
SOLVER 1:
  SOLVER: "MUMPS"
  NAME: "Structure_Solver"
STRUCTURAL DYNAMIC:
  DYNAMICTYPE: "Statics"
  PRESTRESS: "MATERIAL_ITERATIVE"
  PRESTRESSTIME: 100
  RESULTSEVERY: 5
  RESTARTEVERY: 5
  TIMESTEP: 0.1
  NUMSTEP: 1000
  MAXTIME: 100
  TOLDISP: 1e-09
  TOLRES: 1e-09
  LOADLIN: true
  LINEAR_SOLVER: 1
STRUCT NOX/Printing:
  Inner Iteration: false
  Outer Iteration StatusTest: false
MATERIALS:
  - MAT: 1
    MAT_Mixture:
      MATIDMIXTURERULE: 10
      MATIDSCONST: [11, 12, 13, 14]
  - MAT: 10
    MIX_GrowthRemodelMixtureRule:
      GROWTH_STRATEGY: 100
      DENS: 1
      MASSFRAC: [0.1, 0.05, 0.05, 0.8]
  - MAT: 100
    MIX_GrowthStrategy_Stiffness:
      KAPPA: 100
  - MAT: 11
    MIX_Constituent_ExplicitRemodelFiber:
      ORIENTATION:
        constant: [1.0, 0.0, 0.0]
      FIBER_MATERIAL_ID: 110
      ENABLE_GROWTH: false
      DECAY_TIME: 1
      GROWTH_CONSTANT: 1
      DEPOSITION_STRETCH: 0
      DEPOSITION_STRETCH_TIMEFUNCT: 1
  - MAT: 110
    MIX_Constituent_RemodelFiber_Material_Exponential:
      K1: 10
      K2: 30
      COMPRESSION: false
  - MAT: 12
    MIX_Constituent_ExplicitRemodelFiber:
      ORIENTATION:
        constant: [0.57735026919, 0.57735026919, 0.57735026919]
      FIBER_MATERIAL_ID: 120
      ENABLE_GROWTH: false
      DECAY_TIME: 1
      GROWTH_CONSTANT: 1
      DEPOSITION_STRETCH: 0
      DEPOSITION_STRETCH_TIMEFUNCT: 1
  - MAT: 120
    MIX_Constituent_RemodelFiber_Material_Exponential:
      K1: 10
      K2: 30
      COMPRESSION: false
  - MAT: 13
    MIX_Constituent_ExplicitRemodelFiber:
      ORIENTATION:
        constant: [0.57735026919, -0.57735026919, -0.57735026919]
      FIBER_MATERIAL_ID: 130
      ENABLE_GROWTH: false
      DECAY_TIME: 1
      GROWTH_CONSTANT: 1
      DEPOSITION_STRETCH: 0
      DEPOSITION_STRETCH_TIMEFUNCT: 1
  - MAT: 130
    MIX_Constituent_RemodelFiber_Material_Exponential:
      K1: 10
      K2: 30
      COMPRESSION: false
  - MAT: 14
    MIX_Constituent_ElastHyper:
      NUMMAT: 1
      MATIDS: [141]
      PRESTRESS_STRATEGY: 149
  - MAT: 141
    ELAST_IsoExpoPow:
      K1: 10
      K2: 10
      C: 1
  - MAT: 149
    MIX_Prestress_Strategy_Iterative:
      ACTIVE: true
FUNCT1:
  - SYMBOLIC_FUNCTION_OF_TIME: "a"
  - VARIABLE: 0
    NAME: "a"
    TYPE: "linearinterpolation"
    NUMPOINTS: 3
    TIMES: [0, 1, 9.999999999e+09]
    VALUES: [1, 1.13, 1.13]
FUNCT2:
  - COMPONENT: 0
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "a"
  - VARIABLE: 0
    NAME: "a"
    TYPE: "linearinterpolation"
    NUMPOINTS: 3
    TIMES: [0, 1, 9.999999999e+09]
    VALUES: [0, 1, 1]
DESIGN SURF ROBIN SPRING DASHPOT CONDITIONS:
  - E: 1
    NUMDOF: 3
    ONOFF: [1, 1, 1]
    STIFF: [10, 0, 0]
    TIMEFUNCTSTIFF: [0, 0, 0]
    VISCO: [0, 0, 0]
    TIMEFUNCTVISCO: [0, 0, 0]
    DISPLOFFSET: [0, 0, 0]
    TIMEFUNCTDISPLOFFSET: [0, 0, 0]
    FUNCTNONLINSTIFF: [0, 0, 0]
    DIRECTION: "xyz"
DESIGN SURF NEUMANN CONDITIONS:
  - E: 2
    NUMDOF: 6
    ONOFF: [1, 0, 0, 0, 0, 0]
    VAL: [100, 0, 0, 0, 0, 0]
    FUNCT: [2, 0, 0, 0, 0, 0]
DESIGN SURF DIRICH CONDITIONS:
