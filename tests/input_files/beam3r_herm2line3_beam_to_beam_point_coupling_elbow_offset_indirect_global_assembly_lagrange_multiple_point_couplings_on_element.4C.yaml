TITLE:
  - "Test that beam-to-beam point coupling works with multiple coupling pairs on a single beam element."
PROBLEM TYPE:
  PROBLEMTYPE: "Structure"
BEAM INTERACTION:
  REPARTITIONSTRATEGY: "everydt"
BEAM INTERACTION/BEAM TO BEAM POINT COUPLING CONDITIONS:
  - E: 1
    COUPLING_ID: 1
    PARAMETERS:
      PROJECTION_VALID_FACTOR: 2.0
      CONSTRAINT_ENFORCEMENT: "lagrange_multiplier"
      MAX_NUMBER_OF_PAIRS_PER_ELEMENT: 3
  - E: 1
    COUPLING_ID: 1
BEAM INTERACTION/BEAM TO SOLID SURFACE/RUNTIME VTK OUTPUT:
  WRITE_OUTPUT: true
  NODAL_FORCES: true
  MORTAR_LAMBDA_DISCRET: true
  MORTAR_LAMBDA_CONTINUOUS: true
  MORTAR_LAMBDA_CONTINUOUS_SEGMENTS: 5
  SEGMENTATION: true
  INTEGRATION_POINTS: true
  AVERAGED_NORMALS: true
