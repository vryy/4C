TITLE:
  - "Framework test for multiphase flow through rigid porous medium with a body force contribution in
    negative y direction to model gravity effects. We have one fluid phases in the multiphase pore space
    and one fluid phase in the additional porous network with the closing relation >evolutionequation_homogenized_vasculature_tumor<. "
PROBLEM SIZE:
  DIM: 2
PROBLEM TYPE:
  PROBLEMTYPE: "porofluid_pressure_based_elasticity"
STRUCTURAL DYNAMIC:
  DYNAMICTYPE: "OneStepTheta"
  LINEAR_SOLVER: 1
IO/RUNTIME VTK OUTPUT:
  INTERVAL_STEPS: 1
  OUTPUT_DATA_FORMAT: ascii
IO/RUNTIME VTK OUTPUT/STRUCTURE:
  OUTPUT_STRUCTURE: true
  DISPLACEMENT: true
STRUCTURAL DYNAMIC/ONESTEPTHETA:
  THETA: 1
porofluid_elasticity_dynamic:
  total_simulation_time: 2
  time_integration:
    number_of_time_steps: 2
    theta: 1
    time_step_size: 0.01
  output:
    restart_data_every: 1
  coupling_scheme: twoway_monolithic
porofluid_elasticity_dynamic/monolithic:
  nonlinear_solver:
    linear_solver_id: 1
    residual:
      global_tolerance: 1e-06
    increment:
      global_tolerance: 1e-06
porofluid_dynamic:
  initial_condition:
    type: by_condition
  body_force_function: 2
SOLVER 1:
  SOLVER: "UMFPACK"
  NAME: "solver"
MATERIALS:
  - MAT: 1
    MAT_FluidPoroMultiPhase:
      LOCAL: false
      PERMEABILITY: 1.1
      NUMMAT: 3
      MATIDS: [12, 13, 14]
      NUMFLUIDPHASES_IN_MULTIPHASEPORESPACE: 1
  - MAT: 12
    MAT_FluidPoroSinglePhase:
      DENSITYLAWID: 122
      DENSITY: 1.0e-9
      RELPERMEABILITYLAWID: 125
      VISCOSITY_LAW_ID: 124
      DOFTYPEID: 121
  - MAT: 121
    MAT_FluidPoroSinglePhaseDofPressure:
