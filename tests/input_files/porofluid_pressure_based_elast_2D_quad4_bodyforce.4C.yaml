  - MAT: 123
    MAT_PhaseLawConstraint: {}
  - MAT: 124
    MAT_FluidPoroViscosityLawConstant:
      VALUE: 1.5e-8
  - MAT: 125
    MAT_FluidPoroRelPermeabilityLawConstant:
      VALUE: 0.7

  - MAT: 13
    MAT_FluidPoroSingleVolFrac:
      DENSITY: 1.03e-6
      DIFFUSIVITY: 2.0
      AddScalarDependentFlux: false
  - MAT: 14
    MAT_FluidPoroVolFracPressure:
      PERMEABILITY: 1.5e-7
      VISCOSITY_LAW_ID: 141
  - MAT: 141
    MAT_FluidPoroViscosityLawConstant:
      VALUE: 4.0e-6
  - MAT: 2
    MAT_StructPoro:
      MATID: 501
      POROLAWID: 502
      INITPOROSITY: 0.8
  - MAT: 501
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 0.73
      NUE: 0.3
      DENS: 1.0e-6
  - MAT: 502
    MAT_PoroLawDensityDependent:
      DENSITYLAWID: 503
  - MAT: 503
