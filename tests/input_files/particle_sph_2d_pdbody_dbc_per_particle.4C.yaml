      VALUE: 4.49981177339198268e+00
      TOLERANCE: 1e-09
  - PARTICLE:
      ID: 9
      QUANTITY: "posy"
      VALUE: -4.50029236967951718e+00
      TOLERANCE: 1e-09
  - PARTICLE:
      ID: 9
      QUANTITY: "velx"
      VALUE: 1.40734415065886020e+00
      TOLERANCE: 1e-10
  - PARTICLE:
      ID: 9
