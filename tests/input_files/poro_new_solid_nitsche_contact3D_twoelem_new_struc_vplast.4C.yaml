TITLE:
  - "Contact simulation between a solid HEX8 element (master) and a poro-viscoplastic HEX8 element (slave)."
  - "Mortar coupling is applied with the Nitsche algorithm."
  - "A displacement is prescribed using cosine ramps 'downwards' (in the negative z-direction) on the
    upper solid HEX8 element. The bottom surface of the poro-viscoplastic element is fixed."
  - "The poro-viscoplastic material behavior is described by a neo-Hookean porosity law, with Reformulated
    Johnson-Cook finite strain viscoplasticity (see Mareau: A thermodynamically consistent formulation
    of the Johnson-Cook model, Mechanics of Materials 143, 2020).  The solid element is modeled with a
    neo-Hooke elasticity law."
  - "Both elements exhibit the same Young's modulus."
PROBLEM TYPE:
  PROBLEMTYPE: "Poroelasticity"
IO:
  STRUCT_STRESS: "Cauchy"
  FLUID_STRESS: true
