    MAT_fluid:
      DYNVISCOSITY: 0.01
      DENSITY: 1
  - MAT: 3
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 500
      NUE: 0.3
      DENS: 500

CLONING MATERIAL MAP:
