PROBLEM TYPE:
  PROBLEMTYPE: Fluid_Structure_Interaction
PROBLEM SIZE:
  DIM: 3
STRUCTURAL DYNAMIC:
  INT_STRATEGY: "Standard"
  LINEAR_SOLVER: 3
STRUCTURAL DYNAMIC/GENALPHA:
