  LINEAR_SOLVER: 2
  ADAPTCONV: true
ALE DYNAMIC:
  LINEAR_SOLVER: 1
FSI DYNAMIC:
  NUMSTEP: 3
SOLVER 1:
  SOLVER: "UMFPACK"
SOLVER 2:
  SOLVER: "Belos"
  NAME: "Fluid solver"
SOLVER 3:
  SOLVER: "UMFPACK"
MATERIALS:
  - MAT: 1
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 1000
      NUE: 0.3
      DENS: 500
