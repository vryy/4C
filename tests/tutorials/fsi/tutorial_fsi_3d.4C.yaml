    SRC_MAT: 2
    TAR_FIELD: "ale"
    TAR_MAT: 3
FUNCT1:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "(1-cos(2*t*pi/5))"
FUNCT2:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "10*(y-1)*(1-cos(2*t*pi/5))"
RESULT DESCRIPTION:
  - STRUCTURE:
      DIS: "structure"
      NODE: 80
      QUANTITY: "dispx"
      VALUE: 5.467837e-07
      TOLERANCE: 1e-12
  - STRUCTURE:
      DIS: "structure"
      NODE: 80
      QUANTITY: "dispy"
      VALUE: -0.000117721077
      TOLERANCE: 1e-12
  - FLUID:
